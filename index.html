<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accordion</title>

    <link rel="stylesheet" href="./css/style.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
  </head>

  <body>
    <div class="container">
      <!-- Accordion 1 -->
      <div class="accordian">
        <div>
          <input type="radio" name="accordian" id="check1" checked />

          <div class="question">
            <label for="check1">what is HTML?</label>
            <i class="fa-solid fa-angle-right"></i>
          </div>
          <div class="answer">html stands for hyper text markup language.</div>
        </div>
      </div>

      <!-- Accordion 2 -->
      <div class="accordian">
        <div>
          <input type="radio" name="accordian" id="check2" />

          <div class="question">
            <label for="check2">what is CSS?</label>
            <i class="fa-solid fa-angle-right"></i>
          </div>

          <div class="answer">css stands for cascading style sheet.</div>
        </div>
      </div>

      <!-- Accordion 3 -->
      <div class="accordian">
        <div>
          <input type="radio" name="accordian" id="check3" />

          <div class="question">
            <label for="check3">what is JS?</label>
            <i class="fa-solid fa-angle-right"></i>
          </div>

          <div class="answer">js is a scripting language.</div>
        </div>
      </div>
    </div>
  </body>
</html>
